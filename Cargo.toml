cargo-features = ["profile-rustflags"]

[workspace]
members = [

    "lib/common/sbe_derive", "lib/common/fixed_order_cmd",
]

exclude = [
    "study/web3",
]

resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Hongyao Tang"]
license = "MIT"

[workspace.dependencies]
# 共享依赖可以在这里定义

[profile.release]
lto = "fat"
codegen-units = 1
opt-level = 3
target-cpu = "native"
# 启用 Apple Silicon 的向量扩展
rustflags = [
    "-Cllvm-args=--inline-threshold=500",
    "-Cllvm-args=--unroll-count=8"
]
