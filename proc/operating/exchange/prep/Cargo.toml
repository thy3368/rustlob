[package]
name = "prep_proc"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
async-trait = "0.1.89"
tokio = { version = "1.43", features = ["full"] }
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
rand = "0.8"

# Clean Architecture 依赖
account = { path = "../../../../lib/core/account" }

# LOB 仓储依赖
lob_repo = { path = "../../../../lib/common/lob" }
base_types = { path = "../../../../lib/common/base_types" }

# Derive macro
diff_derive = { path = "../../../../lib/common/diff_derive" }

[dev-dependencies]
tokio = { version = "1.43", features = ["full", "test-util"] }
