use_case: 查询订单
command_handler: QueryOrderHandler
product: spot
acceptance_cases:
  - name: 按order_id查询已存在订单成功返回
    given_state: [OrderId(order_001), OrderStatus(open), UserId(user_001)]
    then_state: [OrderInfo]
    expect:
      - 返回 Some(OrderInfo)
      - OrderInfo.order_id = order_001
      - OrderInfo.status = open

  - name: 按order_id查询已撤销订单成功返回
    given_state: [OrderId(order_002), OrderStatus(cancelled), UserId(user_001)]
    then_state: [OrderInfo]
    expect:
      - 返回 Some(OrderInfo)
      - OrderInfo.order_id = order_002
      - OrderInfo.status = cancelled

  - name: 按order_id查询已成交订单成功返回
    given_state: [OrderId(order_003), OrderStatus(filled), UserId(user_001)]
    then_state: [OrderInfo]
    expect:
      - 返回 Some(OrderInfo)
      - OrderInfo.order_id = order_003
      - OrderInfo.status = filled

  - name: 按order_id查询部分成交订单成功返回
    given_state: [OrderId(order_004), OrderStatus(partially_filled), UserId(user_001)]
    then_state: [OrderInfo]
    expect:
      - 返回 Some(OrderInfo)
      - OrderInfo.order_id = order_004
      - OrderInfo.status = partially_filled
      - OrderInfo.filled_quantity < OrderInfo.quantity

  - name: 按不存在的order_id查询返回None
    given_state: [OrderId(not_exist), OrderStatus(nil), UserId(user_001)]
    then_state: []
    expect:
      - 返回 Ok(None)

  - name: 按orig_client_order_id查询成功
    given_state: [OrigClientOrderId(client_001), OrderStatus(open), UserId(user_001)]
    then_state: [OrderInfo]
    expect:
      - 返回 Some(OrderInfo)
      - OrderInfo.orig_client_order_id = client_001

  - name: order_id为空时预检查失败
    given_state: [OrderId(empty), OrderStatus(nil), UserId(user_001)]
    then_state: []
    expect:
      - 返回 Err(SpotCmdError::InvalidOrderId)

  - name: order_id格式无效时预检查失败
    given_state: [OrderId(invalid_format), OrderStatus(nil), UserId(user_001)]
    then_state: []
    expect:
      - 返回 Err(SpotCmdError::InvalidOrderId)

  - name: symbol为空时预检查失败
    given_state: [OrderId(order_001), OrderStatus(open), UserId(user_001), Symbol(empty)]
    then_state: []
    expect:
      - 返回 Err(SpotCmdError::InvalidSymbol)

  - name: symbol格式无效时预检查失败
    given_state: [OrderId(order_001), OrderStatus(open), UserId(user_001), Symbol(invalid)]
    then_state: []
    expect:
      - 返回 Err(SpotCmdError::InvalidSymbol)

  - name: 查询他人订单时返回无权限错误
    given_state: [OrderId(order_001), OrderStatus(open), UserId(user_other)]
    then_state: []
    expect:
      - 返回 Err(SpotCmdError::Unauthorized)

  - name: 数据库连接失败时返回错误
    given_state: [OrderId(order_001), OrderStatus(open), UserId(user_001), DbError(connection)]
    then_state: []
    expect:
      - 返回 Err(SpotCmdError::RepoError)

  - name: 数据库查询超时
    given_state: [OrderId(order_001), OrderStatus(open), UserId(user_001), DbError(timeout)]
    then_state: []
    expect:
      - 返回 Err(SpotCmdError::RepoError)

  - name: timestamp超时被拒绝
    given_state: [OrderId(order_001), OrderStatus(open), UserId(user_001), Timestamp(expired)]
    then_state: []
    expect:
      - 返回 Err(SpotCmdError::TimestampExpired)