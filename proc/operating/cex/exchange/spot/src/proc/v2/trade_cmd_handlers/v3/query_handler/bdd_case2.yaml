# 验收测试用例 - QueryOrderHandler
# 参考 deposit.yaml 格式设计

use_case: 查询订单
command_handler: QueryOrderHandler
product: spot

# 验收用例定义
# 格式说明:
# - given_state: 查询前的状态条件 [OrderId, OrderStatus, UserId]
# - then_state: 查询操作后的状态 [OrderInfo] (无状态变更)
# - expect: 期望的返回结果

acceptance_cases:
  # ==================== 成功场景 ====================

  - name: 按order_id查询已存在订单成功返回
    given_state: [OrderId(order_001), OrderStatus(open), UserId(user_001)]
    then_state: [OrderInfo]
    expect:
      - 返回 Some(OrderInfo)
      - OrderInfo.order_id = order_001
      - OrderInfo.status = open
      - OrderInfo.price = 50000.0
      - OrderInfo.quantity = 1.5

  - name: 按order_id查询已撤销订单成功返回
    given_state: [OrderId(order_002), OrderStatus(cancelled), UserId(user_001)]
    then_state: [OrderInfo]
    expect:
      - 返回 Some(OrderInfo)
      - OrderInfo.order_id = order_002
      - OrderInfo.status = cancelled
      - OrderInfo.canceled_at = 1704067200000

  - name: 按order_id查询已成交订单成功返回
    given_state: [OrderId(order_003), OrderStatus(filled), UserId(user_001)]
    then_state: [OrderInfo]
    expect:
      - 返回 Some(OrderInfo)
      - OrderInfo.order_id = order_003
      - OrderInfo.status = filled
      - OrderInfo.filled_quantity = 1.5

  # ==================== 订单不存在场景 ====================

  - name: 按不存在的order_id查询返回None
    given_state: [OrderId(not_exist), OrderStatus(nil), UserId(user_001)]
    then_state: []
    expect:
      - 返回 Ok(None)
      - 不抛出异常

  # ==================== 预检查失败场景 ====================

  - name: order_id为空时预检查失败
    given_state: [OrderId(empty), OrderStatus(nil), UserId(user_001)]
    then_state: []
    expect:
      - 返回 Err(SpotCmdError::InvalidOrderId)
      - 错误信息包含 "order_id is empty"

  - name: order_id格式无效时预检查失败
    given_state: [OrderId(invalid_format), OrderStatus(nil), UserId(user_001)]
    then_state: []
    expect:
      - 返回 Err(SpotCmdError::InvalidOrderId)
      - 错误信息包含 "invalid order_id format"

  # ==================== 权限验证场景 ====================

  - name: 查询他人订单时返回无权限错误
    given_state: [OrderId(order_001), OrderStatus(open), UserId(user_other)]
    then_state: []
    expect:
      - 返回 Err(SpotCmdError::Unauthorized)
      - 错误信息包含 "not your order"

  # ==================== 仓库错误场景 ====================

  - name: 数据库连接失败时返回错误
    given_state: [OrderId(order_001), OrderStatus(open), UserId(user_001), DbError(connection)]
    then_state: []
    expect:
      - 返回 Err(SpotCmdError::RepoError)
      - 内部错误为 RepoError::ConnectionFailed