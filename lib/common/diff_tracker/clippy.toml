# Clippy 配置文件
# 启用更严格的检查

# ========== 性能相关 ==========
# 检测性能问题和低效代码

# ========== 代码质量 ==========
# 检测代码异味和反模式

# ========== 可读性 ==========
# 提高代码可读性

# ========== 复杂度 ==========
# 控制代码复杂度
cognitive-complexity-threshold = 15
too-many-lines-threshold = 150

# ========== 低延迟开发特定配置 ==========
# 针对高性能/低延迟代码的特殊要求
avoid-breaking-exported-api = false

# ========== 允许的 lint（避免过于严格）==========
# 某些 lint 可能对特定场景不适用
