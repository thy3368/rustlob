# Clippy 配置文件 - 专注于性能和低延迟
#
# 此配置文件用于设置 Clippy 的阈值和行为
# 主要的 lint 规则在 Cargo.toml 的 [lints.clippy] 中配置

# ========== 复杂度阈值 ==========
# 控制代码复杂度的上限

# 认知复杂度阈值（函数不应过于复杂）
# 默认值: 25，我们设置为 15 以保持代码简单
cognitive-complexity-threshold = 15

# 函数代码行数阈值
# 默认值: 100，我们设置为 150
too-many-lines-threshold = 150

# 函数参数数量阈值
# 默认值: 7
too-many-arguments-threshold = 7

# ========== 类型大小阈值 ==========
# 控制什么被认为是"大类型"

# 通过值传递的大类型阈值（字节）
# 默认值: 256 字节
# 超过此大小的类型应该通过引用传递
type-complexity-threshold = 250

# 栈数组大小阈值（字节）
# 默认值: 512000
# 超过此大小的数组应该放在堆上
array-size-threshold = 512000

# Enum 变体大小差异阈值（字节）
# 默认值: 200
# 如果最大变体比第二大的变体大太多，建议 Box 包装
enum-variant-size-threshold = 200

# Vec 大小阈值
# 默认值: 4096
vec-box-size-threshold = 4096

# ========== 性能相关阈值 ==========

# 单字符字面量阈值
# 单字符字符串应该用 char 而不是 &str
single-char-binding-names-threshold = 4

# ========== 低延迟开发特定配置 ==========
# 针对高性能/低延迟代码的特殊要求

# 允许破坏导出的 API（低延迟项目优先性能）
avoid-breaking-exported-api = false

# ========== Cargo.toml 特定 ==========
# 与 Cargo.toml 依赖检查相关

# 允许的重复依赖项
# allow-duplicate-crates = []

# 允许的通配符导入
# allow-wildcard-imports = []

# ========== 文档要求 ==========
# 在测试代码中放宽文档要求（已在 Cargo.toml 中配置）

# 注意：主要的 lint 启用/禁用配置在 Cargo.toml 的 [lints.clippy] 中
# 此文件主要用于设置阈值和全局行为
