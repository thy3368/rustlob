[package]
name = "example_inbound_adapter"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
actix-web = "4"
axum = "0.7"
cmd_handler = { path = "../../common/cmd_handler" }
example_core = { path = "../core" }
inbound_adapter_support = { path = "../../common/inbound_adapter_support" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
example_outbound_adapter = { path = "../outbound_adapter" }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net", "time"] }
