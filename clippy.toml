# 严禁 unwrap / expect
disallowed-methods = [
    "std::option::Option::unwrap",
    "std::result::Result::unwrap",
    "std::result::Result::expect",
]

# 补充约束：禁止直接依赖 panic 运行时类型
disallowed-types = [
    "core::panic::PanicInfo",
]

# `PanicInfo` 不能拦住 `panic!`，这里直接禁用 panic 宏
disallowed-macros = [
    "std::panic",
    "core::panic",
]
